<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="todo-app">

    <!-- Cabeçalho -->
    <header class="todo-header">
      <h1>To-Do List</h1>
    </header>

    <!-- Formulário (simulação) -->
    <section class="todo-form-section" aria-labelledby="form-title">
      <h2 id="form-title">Adicionar tarefa</h2>

      <form class="todo-form">

        <!-- Campo de texto -->
        <div class="form-group">
          <label for="task-input">Tarefa</label>
          <input 
            type="text" 
            id="task-input" 
            placeholder="Ex: Estudar CSS"
          >
        </div>

        <!-- Prioridade -->
        <fieldset class="form-group">
          <legend>Prioridade</legend>

          <label>
            <input type="radio" name="priority" checked>
            Baixa
          </label>

          <label>
            <input type="radio" name="priority">
            Média
          </label>

          <label>
            <input type="radio" name="priority">
            Alta
          </label>
        </fieldset>

        <!-- Botão (visual) -->
        <button type="button" aria-disabled="true">
          Adicionar (simulado)
        </button>

      </form>
    </section>

    <!-- Lista de tarefas -->
    <section class="todo-list-section" aria-labelledby="list-title">
      <h2 id="list-title">Tarefas</h2>

      <ul class="todo-list">

        <!-- Tarefa -->
        <li class="todo-item alta">
          <input type="checkbox" id="task-estudar-html">
          <label for="task-estudar-html">
            <span class="task-text">Estudar HTML</span>
            <span class="task-priority">Alta prioridade</span>
          </label>
        </li>

        <li class="todo-item media">
          <input type="checkbox" id="task-praticar-ingles">
          <label for="task-praticar-ingles">
            <span class="task-text">Praticar inglês</span>
            <span class="task-priority">Média prioridade</span>
          </label>
        </li>

        <li class="todo-item baixa">
          <input type="checkbox" id="task-academia">
          <label for="task-academia">
            <span class="task-text">Ir à academia</span>
            <span class="task-priority">Baixa prioridade</span>
          </label>
        </li>

      </ul>
    </section>

  </main>

</body>
</html>
